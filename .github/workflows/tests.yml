name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@6

      - name: Set up Python
        uses: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Verify sentence-transformers is installed
        run: |
          uv run python -c "import sys; print(sys.executable)
          uv run python -c "import sentence-transformers; print(sentence-transformers.__version__)"

      - name: Run tests
        run: |
          uv run pytest
